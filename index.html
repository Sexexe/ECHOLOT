<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ECHOLOT • WORLD RADIO</title>
  <!-- Подключение библиотеки Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #0d0d14;
      --text: #b0b8c0;
      --text-dim: #5a606a;
      /* Чуть более зеленоватый лазурный */
      --cyan: #00d4c4;
      --cyan-dim: rgba(0, 212, 196, 0.1);
      --cyan-glow: rgba(0, 212, 196, 0.8);
      --red: #ff4466;
      --red-glow: rgba(255, 68, 102, 0.6);
      --yellow: #ffaa00;
      --border: rgba(255, 255, 255, 0.03);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0; padding: 20px 12px; min-height: 100vh;
      font-weight: 100; letter-spacing: 0.5px;
      padding-bottom: 160px;
    }

    .header-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
      margin-bottom: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 20px;
      padding: 0 10px;
      flex-wrap: nowrap;
    }

    .lang-switch {
      display: flex;
      gap: 4px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px;
      margin-left: auto; /* Всегда прижат к правому краю */
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 6px 14px;
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 16px;
      font-weight: 300;
      letter-spacing: 1px;
      transition: all 0.3s;
      font-family: inherit;
    }
    /* Горящие буквы без фона */
    .lang-btn.active {
      background: transparent;
      color: var(--cyan);
      box-shadow: none;
      text-shadow: 0 0 8px var(--cyan), 0 0 16px var(--cyan-glow), 0 0 24px var(--cyan);
      font-weight: 500;
    }

    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.3s;
      font-family: inherit;
      display: none;
    }
    /* Постоянная небольшая подсветка при видимости */
    .back-btn.visible {
      display: inline-block;
      border-color: rgba(0, 212, 196, 0.35);
      box-shadow: 0 0 10px rgba(0, 212, 196, 0.18), inset 0 0 6px rgba(0, 212, 196, 0.05);
      color: var(--text);
    }
    .back-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 15px var(--cyan-dim);
    }

    .echolot-title {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      margin: 20px 0;
      font-weight: 100;
      font-size: 3.5rem;
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    .echolot-letter {
      display: inline-block;
      animation: textPulse 7s ease-in-out infinite;
    }

    .echolot-logo {
      width: 90px;
      height: 90px;
      margin: 0 10px;
      animation: logoPulse 7s ease-in-out infinite;
    }

    @keyframes textPulse {
      0%, 100% { 
        color: var(--cyan); 
        text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0, 212, 196, 0.6); 
      }
      50% { 
        color: #000000; 
        text-shadow: none; 
      }
    }

    @keyframes logoPulse {
      0%, 100% { 
        filter: drop-shadow(0 0 5px rgba(0, 212, 196, 0.2)); 
        opacity: 0.6; 
      }
      50% { 
        filter: drop-shadow(0 0 25px var(--cyan)) drop-shadow(0 0 50px rgba(0, 212, 196, 0.8)); 
        opacity: 1; 
      }
    }

    .sub {
      font-size: 0.55rem; 
      color: var(--text-dim);
      margin-bottom: 24px; 
      letter-spacing: 1px; 
      font-weight: 300; 
      text-transform: uppercase;
      line-height: 1.4;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 24px;
      max-width: 1200px;
      margin: 0 auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .status {
      text-align: center; font-size: 0.7rem; color: var(--text-dim);
      margin-bottom: 20px; font-family: monospace; letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    /* Genre grid - 3 колонки */
    .genre-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .genre-card {
      background: rgba(255, 255, 255, 0.02);
      border: none;
      padding: 24px 16px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      text-align: center;
      font-family: inherit;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(5px);
    }

    .genre-card:hover {
      background: rgba(0, 212, 196, 0.1);
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 0 25px var(--cyan-dim), inset 0 0 20px rgba(0, 212, 196, 0.05);
      border: 1px solid rgba(0, 212, 196, 0.3);
    }

    .genre-card:active {
      transform: scale(0.98);
    }

    /* Серебряные иконки через CSS filter */
    .genre-icon {
      font-size: 2rem;
      filter: grayscale(100%) brightness(1.4) contrast(1.05);
      -webkit-filter: grayscale(100%) brightness(1.4) contrast(1.05);
      transition: transform 0.3s, filter 0.3s;
    }
    
    .genre-card:hover .genre-icon {
      transform: scale(1.1);
      filter: grayscale(100%) brightness(1.7) contrast(1.15) drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
    }

    .genre-name {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 1px;
      color: #fff;
      text-transform: uppercase;
    }

    .genre-count {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      font-family: monospace;
      background: rgba(0,0,0,0.3);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .stations-view { display: none; }
    .stations-view.active { display: block; }
    .genres-view.hidden { display: none; }

    .genre-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    /* Название жанра уменьшено в 1.5 раза и в одну строчку */
    .genre-header-title {
      font-size: 1rem;
      color: var(--cyan);
      font-weight: 100;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .genre-header-sub {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
    thead th {
      color: var(--text-dim);
      font-weight: 300; font-size: 0.55rem; letter-spacing: 1px; text-transform: uppercase;
      padding: 8px 4px; text-align: left;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }
    thead th:hover { color: var(--cyan); }
    thead th:first-child { width: 40%; }
    thead th:nth-child(2) { width: 25%; text-align: center; }
    thead th:nth-child(3) { width: 15%; text-align: center; }
    thead th:last-child { text-align: center; width: 20%; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: all 0.2s;
    }
    tbody tr:hover {
      background: rgba(0, 212, 196, 0.03);
    }
    tbody tr:hover td { color: #fff; }
    tbody tr:last-child { border-bottom: none; }

    td { padding: 10px 4px; }
    .station { font-weight: 300; font-size: 0.75rem; color: var(--text); }
    .station-country {
      display: inline-block;
      font-size: 0.55rem;
      color: var(--text-dim);
      margin-left: 6px;
      letter-spacing: 0.5px;
    }
    .bitrate { text-align: center; font-family: 'Courier New', monospace; font-size: 0.6rem; color: var(--text); }
    
    .signal-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      background: transparent;
      font-family: inherit;
      gap: 4px;
    }
    .signal-btn.play { color: var(--cyan); background: rgba(0, 212, 196, 0.1); }
    .signal-btn.play:hover { background: rgba(0, 212, 196, 0.2); box-shadow: 0 0 10px var(--cyan-dim); }
    .signal-btn.stop { color: var(--red); background: rgba(255, 68, 102, 0.1); animation: blink 1.5s infinite; }
    
    /* CSS иконки для кнопок PLAY/STOP в таблице */
    .btn-icon {
      display: inline-block;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .btn-icon.play-icon {
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid currentColor;
    }
    .btn-icon.stop-icon {
      width: 8px;
      height: 8px;
      background: currentColor;
      border-radius: 1px;
    }
    .btn-text {
      vertical-align: middle;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .now-playing {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(13, 13, 20, 0.95);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-top: 1px solid var(--cyan-dim);
      padding: 16px 20px; font-size: 0.7rem; color: var(--text-dim);
      font-family: monospace; letter-spacing: 0.5px;
      display: none; flex-direction: column; gap: 12px;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.7);
      z-index: 1000;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
    }
    .now-playing.active { display: flex; }
    .now-playing.skipping { border-top-color: var(--yellow); }
    .now-playing.skipping .np-label { color: var(--yellow); }
    
    .np-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .np-indicator {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
      animation: blink 1.5s infinite;
      flex-shrink: 0;
    }
    .np-indicator.skip { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
    
    .np-label { color: var(--cyan); font-weight: 300; transition: color 0.3s; flex-shrink: 0; }
    .np-track { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .np-controls {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }
    
    .np-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 212, 196, 0.2);
      color: var(--text-dim);
      width: 44px; 
      height: 44px; 
      border-radius: 50%;
      cursor: pointer; 
      font-size: 1.1rem;
      display: flex; 
      align-items: center; 
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(4px);
      font-family: inherit;
      padding: 0;
    }

    .np-btn::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: radial-gradient(circle, var(--cyan-glow) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s, opacity 0.4s;
      opacity: 0;
      z-index: 0;
    }

    .np-btn:hover::before {
      width: 100%; height: 100%;
      opacity: 0.3;
    }

    .np-btn:hover {
      border-color: var(--cyan);
      color: #fff;
      box-shadow: 0 0 20px var(--cyan-dim), inset 0 0 10px rgba(0, 212, 196, 0.2);
      transform: scale(1.1);
      z-index: 1;
    }

    .np-btn:active { transform: scale(0.95); }

    .np-btn.mute { 
      color: var(--cyan); 
      border-color: var(--cyan);
    }
    
    .np-btn.mute.muted {
      color: var(--red);
      border-color: var(--red);
    }
    
    .np-btn.mute.muted::before {
      background: radial-gradient(circle, var(--red-glow) 0%, transparent 70%);
    }

    .np-btn.mute.muted:hover {
      box-shadow: 0 0 20px rgba(255, 68, 102, 0.3), inset 0 0 10px rgba(255, 68, 102, 0.2);
    }

    .np-btn.stop-btn:hover { 
      border-color: var(--red);
      color: #fff;
      box-shadow: 0 0 20px rgba(255, 68, 102, 0.3), inset 0 0 10px rgba(255, 68, 102, 0.2);
    }
    .np-btn.stop-btn:hover::before {
      background: radial-gradient(circle, var(--red-glow) 0%, transparent 70%);
    }
    
    /* CSS иконки для нижней панели управления */
    .ctrl-icon {
      display: inline-block;
      position: relative;
      z-index: 1;
    }
    .ctrl-icon.play-icon {
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 12px solid currentColor;
      margin-left: 3px;
    }
    .ctrl-icon.stop-icon {
      width: 14px;
      height: 14px;
      background: currentColor;
      border-radius: 2px;
    }
    .ctrl-icon.prev-icon {
      width: 14px;
      height: 14px;
      position: relative;
    }
    .ctrl-icon.prev-icon::before {
      content: '';
      position: absolute;
      top: 0;
      left: 4px;
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-right: 10px solid currentColor;
    }
    .ctrl-icon.prev-icon::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 2px;
      height: 14px;
      background: currentColor;
    }
    .ctrl-icon.next-icon {
      width: 14px;
      height: 14px;
      position: relative;
    }
    .ctrl-icon.next-icon::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 10px solid currentColor;
    }
    .ctrl-icon.next-icon::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 2px;
      height: 14px;
      background: currentColor;
    }
    .ctrl-icon.mute-icon {
      font-size: 1.1rem;
      line-height: 1;
    }

    footer { 
      text-align: center; font-size: 0.6rem; color: var(--text-dim); 
      margin-top: 24px; letter-spacing: 1px; font-weight: 100;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    @media(max-width: 600px) {
      .echolot-title { font-size: 2.2rem; letter-spacing: 4px; }
      .echolot-logo { width: 60px; height: 60px; }
      .sub { font-size: 0.45rem; letter-spacing: 0.5px; }
      .panel { padding: 16px; border-radius: 20px; }
      .genre-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .genre-card { padding: 18px 8px; border-radius: 18px; gap: 8px; }
      .genre-name { font-size: 0.7rem; letter-spacing: 0.5px; }
      .genre-icon { font-size: 1.5rem; }
      .genre-count { font-size: 0.55rem; }
      table { font-size: 0.65rem; }
      th, td { padding: 6px 3px; }
      .station { font-size: 0.65rem; }
      .bitrate { font-size: 0.55rem; }
      .signal-btn { font-size: 0.5rem; padding: 3px 8px; }
      .now-playing { font-size: 0.65rem; padding: 12px 16px; border-radius: 20px 20px 0 0; }
      .np-btn { width: 40px; height: 40px; font-size: 1rem; }
      .ctrl-icon.play-icon { border-top-width: 6px; border-bottom-width: 6px; border-left-width: 9px; }
      .ctrl-icon.stop-icon { width: 10px; height: 10px; }
      .ctrl-icon.prev-icon, .ctrl-icon.next-icon { width: 10px; height: 10px; }
      .ctrl-icon.prev-icon::before, .ctrl-icon.next-icon::before { border-top-width: 5px; border-bottom-width: 5px; border-left-width: 7px; border-right-width: 7px; }
      .ctrl-icon.prev-icon::after, .ctrl-icon.next-icon::after { height: 10px; }
      .np-controls { gap: 12px; }
      .top-bar { flex-wrap: nowrap; gap: 8px; }
    }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="top-bar">
      <button class="back-btn" id="backBtn" onclick="showGenres()">← <span data-i18n="back">Назад</span></button>
      <div class="lang-switch">
        <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn active" data-lang="ru" onclick="setLanguage('ru')">RU</button>
      </div>
    </div>

    <div class="echolot-title">
      <span class="echolot-letter">E</span>
      <span class="echolot-letter">C</span>
      <span class="echolot-letter">H</span>
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%2300d4c4'/%3E%3Cstop offset='100%25' stop-color='%230a0a0f'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect fill='%230a0a0f' width='200' height='200' rx='24'/%3E%3Ccircle cx='100' cy='100' r='80' fill='none' stroke='%2300d4c4' stroke-width='3' opacity='0.3'/%3E%3Ccircle cx='100' cy='100' r='60' fill='none' stroke='%2300d4c4' stroke-width='3' opacity='0.5'/%3E%3Ccircle cx='100' cy='100' r='40' fill='none' stroke='%2300d4c4' stroke-width='3' opacity='0.7'/%3E%3Ccircle cx='100' cy='100' r='20' fill='none' stroke='%2300d4c4' stroke-width='3'/%3E%3C/svg%3E" alt="ECHOLOT Logo" class="echolot-logo">
      <span class="echolot-letter">L</span>
      <span class="echolot-letter">O</span>
      <span class="echolot-letter">T</span>
    </div>
    <div class="sub" data-i18n="subtitle">Verified World Radio Streams</div>
  </div>

  <div class="panel">
    <div class="status" id="status">STATUS: <span data-i18n="awaiting">ВЫБОР ЖАНРА</span></div>

    <div class="genres-view" id="genresView">
      <div class="genre-grid" id="genreGrid"></div>
    </div>

    <div class="stations-view" id="stationsView">
      <div class="genre-header">
        <div class="genre-header-title" id="genreHeaderTitle"></div>
        <div class="genre-header-sub" id="genreHeaderSub"></div>
      </div>
      <table>
        <thead>
          <tr>
            <th data-i18n="th_station">Станция ↕</th>
            <th data-i18n="th_country">Страна ↕</th>
            <th data-i18n="th_bitrate">Битрейт ↕</th>
            <th data-i18n="th_signal">Сигнал</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="now-playing" id="nowPlaying">
    <div class="np-top">
      <div class="np-indicator" id="npIndicator"></div>
      <span class="np-label" id="npLabel">NOW PLAYING:</span>
      <span class="np-track" id="npTrack">—</span>
    </div>
    <div class="np-controls">
      <button class="np-btn" onclick="playPrevious()" title="Previous"><span class="ctrl-icon prev-icon"></span></button>
      <button class="np-btn stop-btn" onclick="stopPlayback()" title="Stop"><span class="ctrl-icon stop-icon"></span></button>
      <button class="np-btn" onclick="playNext()" title="Next"><span class="ctrl-icon next-icon"></span></button>
      <button class="np-btn mute" id="muteBtn" onclick="toggleMute()" title="Mute"><span class="ctrl-icon mute-icon">🔊</span></button>
    </div>
  </div>

  <footer data-i18n="footer">WORLD RADIO • VERIFIED STREAMS</footer>
  <audio id="audioPlayer" preload="none"></audio>

<script>
  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }

  const translations = {
    en: {
      back: "Back",
      subtitle: "Verified World Radio Streams",
      awaiting: "SELECT GENRE",
      th_station: "Station ↕",
      th_country: "Country ↕",
      th_bitrate: "Bitrate ↕",
      th_signal: "Signal",
      footer: "WORLD RADIO • VERIFIED STREAMS",
      status_ready: "READY",
      status_stations: "STATIONS AVAILABLE",
      now_playing: "NOW PLAYING:",
      tuning: "TUNING:",
      connecting: "Connecting to",
      signal_lost: "Signal lost. Tuning to",
      stations: "stations",
      genre_pop: "Pop / Mainstream",

    { id: 117, genre: "news", name: { en: "SomaFM: Sleepbot", ru: "Sleepbot" }, country: { en: "USA", ru: "США" }, bitrate: "128 kbps", stream: "https://ice1.somafm.com/sleepbot-128-mp3" },
    { id: 118, genre: "news", name: { en: "SomaFM: Deep Space", ru: "Deep Space" }, country: { en: "USA", ru: "США" }, bitrate: "128 kbps", stream: "https://ice1.somafm.com/deepspaceone-128-mp3" },
    { id: 119, genre: "news", name: { en: "SomaFM: Vapowave", ru: "Vapowave" }, country: { en: "USA", ru: "США" }, bitrate: "128 kbps", stream: "https://ice1.somafm.com/vapowave-128-mp3" },
    { id: 120, genre: "news", name: { en: "SomaFM: Synthphaet", ru: "Synthphaet" }, country: { en: "USA", ru: "США" }, bitrate: "128 kbps", stream: "https://ice1.somafm.com/synthphaet-128-mp3" }
  ];

  const genresConfig = [
    { id: "pop", icon: "🎤", key: "genre_pop" },
    { id: "rock", icon: "🎸", key: "genre_rock" },
    { id: "electronic", icon: "🎧", key: "genre_electronic" },
    { id: "jazz", icon: "🎷", key: "genre_jazz" },
    { id: "classical", icon: "🎻", key: "genre_classical" },
    { id: "ambient", icon: "🌌", key: "genre_ambient" },
    { id: "indie", icon: "🎹", key: "genre_indie" },
    { id: "hiphop", icon: "📻", key: "genre_hiphop" },
    { id: "metal", icon: "🤘", key: "genre_metal" },
    { id: "lounge", icon: "🍸", key: "genre_lounge" },
    { id: "news", icon: "📰", key: "genre_news" }
  ];

  let currentLang = 'ru';
  let currentGenre = null;
  let filteredStations = [];
  let currentStationId = null;
  let stallTimer = null;
  let isAutoSkipping = false;
  let isMuted = false;
  let currentlyPlayingBtn = null;

  const audioPlayer = document.getElementById('audioPlayer');
  const nowPlaying = document.getElementById('nowPlaying');
  const npTrack = document.getElementById('npTrack');
  const npLabel = document.getElementById('npLabel');
  const npIndicator = document.getElementById('npIndicator');
  const muteBtn = document.getElementById('muteBtn');
  const muteIcon = muteBtn.querySelector('.mute-icon');

  function setLanguage(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    document.documentElement.lang = lang;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (translations[lang][key]) {
        el.textContent = translations[lang][key];
      }
    });

    renderGenres();
    if (currentGenre) {
      renderStations();
      updateGenreHeader();
    }
    if (currentStationId) {
      const st = worldStations.find(s => s.id === currentStationId);
      if (st) npTrack.textContent = st.name[lang];
    }
  }

  function t(key) {
    return translations[currentLang][key] || key;
  }

  function renderGenres() {
    const grid = document.getElementById('genreGrid');
    grid.innerHTML = '';
    genresConfig.forEach(g => {
      const count = worldStations.filter(s => s.genre === g.id).length;
      const card = document.createElement('button');
      card.className = 'genre-card';
      card.onclick = () => selectGenre(g.id);
      card.innerHTML = `
        <div class="genre-icon">${g.icon}</div>
        <div class="genre-name">${t(g.key)}</div>
        <div class="genre-count">${count} ${t('stations')}</div>
      `;
      grid.appendChild(card);
    });
    document.getElementById('status').innerHTML = `STATUS: ${t('status_ready')} • ${worldStations.length} ${t('stations')}`;
  }

  function selectGenre(genreId) {
    currentGenre = genreId;
    filteredStations = worldStations.filter(s => s.genre === genreId);
    
    document.getElementById('genresView').classList.add('hidden');
    document.getElementById('stationsView').classList.add('active');
    document.getElementById('backBtn').classList.add('visible');
    
    updateGenreHeader();
    renderStations();
  }

  function updateGenreHeader() {
    const cfg = genresConfig.find(g => g.id === currentGenre);
    if (!cfg) return;
    document.getElementById('genreHeaderTitle').textContent = `${cfg.icon} ${t(cfg.key)}`;
    document.getElementById('genreHeaderSub').textContent = `${filteredStations.length} ${t('stations')}`;
    document.getElementById('status').innerHTML = `STATUS: ${t('status_stations')} • ${filteredStations.length}`;
  }

  function showGenres() {
    currentGenre = null;
    filteredStations = [];
    document.getElementById('genresView').classList.remove('hidden');
    document.getElementById('stationsView').classList.remove('active');
    document.getElementById('backBtn').classList.remove('visible');
    renderGenres();
  }

  function renderStations() {
    const tbody = document.getElementById('tbody');
    if (!filteredStations.length) {
      tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:30px; color:var(--text-dim);">No stations</td></tr>`;
      return;
    }

    let html = '';
    filteredStations.forEach(r => {
      html += `<tr>
        <td><span class="station">${r.name[currentLang]}</span></td>
        <td class="genre">${r.country[currentLang]}</td>
        <td class="bitrate">${r.bitrate}</td>
        <td style="text-align:center;">
          <button class="signal-btn play" data-id="${r.id}" onclick="playStation(${r.id})">
            <span class="btn-icon play-icon"></span>
            <span class="btn-text">PLAY</span>
          </button>
        </td>
      </tr>`;
    });
    tbody.innerHTML = html;
  }

  function updateNowPlaying(text, isSkipping = false) {
    npTrack.textContent = text;
    nowPlaying.classList.add('active');
    if (isSkipping) {
      nowPlaying.classList.add('skipping');
      npIndicator.classList.add('skip');
      npLabel.textContent = t('tuning');
      npLabel.style.color = "var(--yellow)";
    } else {
      nowPlaying.classList.remove('skipping');
      npIndicator.classList.remove('skip');
      npLabel.textContent = t('now_playing');
      npLabel.style.color = "var(--cyan)";
    }
  }

  function playStation(stationId) {
    const station = worldStations.find(s => s.id === stationId);
    if (!station) return;

    if (currentlyPlayingBtn) {
      currentlyPlayingBtn.innerHTML = '<span class="btn-icon play-icon"></span><span class="btn-text">PLAY</span>';
      currentlyPlayingBtn.classList.remove('stop');
      currentlyPlayingBtn.classList.add('play');
    }
    if (stallTimer) clearTimeout(stallTimer);

    currentStationId = stationId;
    audioPlayer.src = station.stream;
    audioPlayer.muted = isMuted;
    
    const btn = document.querySelector(`button[data-id="${stationId}"]`);
    if (btn) {
      btn.innerHTML = '<span class="btn-icon stop-icon"></span><span class="btn-text">STOP</span>';
      btn.classList.remove('play');
      btn.classList.add('stop');
      currentlyPlayingBtn = btn;
    }
    
    updateNowPlaying(t('connecting') + " " + station.name[currentLang] + "...");

    const playPromise = audioPlayer.play();
    if (playPromise !== undefined) {
      playPromise.then(() => {
        updateNowPlaying(station.name[currentLang] + " • " + station.country[currentLang]);
      }).catch(error => {
        console.warn("Play failed, auto-skipping:", error);
        skipToNext();
      });
    }

    stallTimer = setTimeout(() => {
      if (audioPlayer.readyState < 3) { 
        console.warn("Stream stalled, auto-skipping...");
        skipToNext();
      }
    }, 8000);
  }

  function playNext() {
    if (!currentStationId || filteredStations.length === 0) return;
    let nextIndex = filteredStations.findIndex(s => s.id === currentStationId) + 1;
    if (nextIndex >= filteredStations.length) nextIndex = 0;
    playStation(filteredStations[nextIndex].id);
  }

  function playPrevious() {
    if (!currentStationId || filteredStations.length === 0) return;
    let prevIndex = filteredStations.findIndex(s => s.id === currentStationId) - 1;
    if (prevIndex < 0) prevIndex = filteredStations.length - 1;
    playStation(filteredStations[prevIndex].id);
  }

  function toggleMute() {
    isMuted = !isMuted;
    audioPlayer.muted = isMuted;
    muteIcon.textContent = isMuted ? "🔇" : "🔊";
    muteBtn.classList.toggle('muted', isMuted);
  }

  function skipToNext() {
    if (isAutoSkipping) return; 
    isAutoSkipping = true;
    
    let nextIndex = filteredStations.findIndex(s => s.id === currentStationId) + 1;
    if (nextIndex >= filteredStations.length) nextIndex = 0;
    
    const nextStation = filteredStations[nextIndex];
    updateNowPlaying(t('signal_lost') + " " + nextStation.name[currentLang] + "...", true);
    
    setTimeout(() => {
      isAutoSkipping = false;
      playStation(nextStation.id);
    }, 1500);
  }

  function stopPlayback() {
    audioPlayer.pause();
    audioPlayer.src = '';
    if (currentlyPlayingBtn) {
      currentlyPlayingBtn.innerHTML = '<span class="btn-icon play-icon"></span><span class="btn-text">PLAY</span>';
      currentlyPlayingBtn.classList.remove('stop');
      currentlyPlayingBtn.classList.add('play');
      currentlyPlayingBtn = null;
    }
    if (stallTimer) clearTimeout(stallTimer);
    currentStationId = null;
    nowPlaying.classList.remove('active');
  }

  audioPlayer.addEventListener('error', () => {
    console.warn("Audio stream error, auto-skipping...");
    skipToNext();
  });

  window.addEventListener('DOMContentLoaded', () => {
    setLanguage('ru');
  });
</script>
